#cloud-config
autoinstall:
  version: 1
  locale: en_US.UTF-8
  keyboard:
    layout: us
  identity:
    hostname: oreoserv
    username: oreo
    password: #crypted password here
  ssh:
    install-server: true
    allow-pw: false
    authorized-keys:
      - #public key here
  network:
    version: 2
    ethernets:
      enp0s3:
        dhcp4: true
  storage:
    layout:
      name: direct
  packages:
    - sudo
    - openssh-server
    - python3
    - python3-pip
    - git
    - net-tools
    - curl
    - vim
    - ufw
  userdata:
    timezone: UTC
    disable_root: false

  